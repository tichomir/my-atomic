name: Build Atomic OS Images

on:
  push:
    branches: [main]
    paths:
      - 'images/**'
      - 'os/**'
      - 'daemon/**'
      - 'policy/**'
      - 'runtime/**'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # --- Stage 1: Test the Go daemon ---
  test-daemon:
    name: Test Go Daemon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: daemon/go.sum

      - name: Build daemon and CLI
        run: |
          cd daemon
          go build ./...

      - name: Run daemon tests
        run: |
          cd daemon
          go test -v -race ./...

      - name: Check for security issues
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          cd daemon && gosec ./... || true  # Non-blocking for now

  # --- Stage 2: Validate OPA policies ---
  test-policies:
    name: Validate OPA Policies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Run policy unit tests
        run: opa test policy/ -v

      - name: Check policy formatting
        run: opa fmt --diff policy/ || true

  # --- Stage 3: Build atomic-base image ---
  build-atomic-base:
    name: Build atomic-linux
    needs: [test-daemon, test-policies]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/atomic-linux
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/atomic-base/Containerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Stage 4: Build agentic-os image ---
  build-agentic-os:
    name: Build agentic-os
    needs: [build-atomic-base]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/agentic-os
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/agentic-os/Containerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/atomic-cloud:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Stage 5: Sign images with cosign (supply chain integrity) ---
  sign-images:
    name: Sign OCI Images
    needs: [build-agentic-os]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write  # For keyless signing with OIDC

    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign agentic-os image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/agentic-os@${{ needs.build-agentic-os.outputs.image-digest }}
