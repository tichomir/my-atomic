name: Publish Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # Build versioned release images
  build-release:
    name: Build Release Images
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    outputs:
      agentic-os-digest: ${{ steps.build-agentic.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push atomic-linux release
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/atomic-base/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/atomic-linux:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/atomic-linux:latest
          build-args: BUILD_VERSION=${{ github.ref_name }}

      - name: Build and push agentic-os release
        id: build-agentic
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/agentic-os/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/agentic-os:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/agentic-os:latest
          build-args: |
            BUILD_VERSION=${{ github.ref_name }}
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/atomic-cloud:${{ github.ref_name }}

      - name: Sign release images
        uses: sigstore/cosign-installer@v3
      - run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/agentic-os@${{ steps.build-agentic.outputs.digest }}

  # Convert OCI image to cloud disk formats using bootc-image-builder
  build-cloud-images:
    name: Build Cloud Disk Images
    needs: [build-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    strategy:
      matrix:
        format: [qcow2, ami]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install bootc-image-builder
        run: |
          sudo apt-get update -q
          sudo apt-get install -y qemu-utils
          # Pull bootc-image-builder via container
          podman pull quay.io/centos-bootc/bootc-image-builder:latest || true

      - name: Build ${{ matrix.format }} disk image
        run: |
          mkdir -p output/${{ matrix.format }}
          sudo podman run \
            --rm \
            --privileged \
            --pull=newer \
            -v $(pwd)/output/${{ matrix.format }}:/output \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type ${{ matrix.format }} \
            --output /output \
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/agentic-os:${{ github.ref_name }} || \
          echo "bootc-image-builder not available in this environment, skipping disk image"

      - name: Upload disk image artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentic-os-${{ matrix.format }}-${{ github.ref_name }}
          path: output/${{ matrix.format }}/
          retention-days: 30
        if: success()

  # Create GitHub Release with changelog
  create-release:
    name: Create GitHub Release
    needs: [build-cloud-images]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/**/*
          body: |
            ## Agentic OS ${{ github.ref_name }}

            ### Installation

            ```bash
            # Switch an existing bootc system to Agentic OS
            sudo bootc switch ghcr.io/${{ env.IMAGE_OWNER }}/agentic-os:${{ github.ref_name }}

            # Or install fresh using bootc-image-builder
            # See docs/getting-started.md
            ```

            ### Images
            - `ghcr.io/${{ env.IMAGE_OWNER }}/atomic-linux:${{ github.ref_name }}` - Base OS
            - `ghcr.io/${{ env.IMAGE_OWNER }}/agentic-os:${{ github.ref_name }}` - Agentic OS (full stack)

            ### Verify image signature
            ```bash
            cosign verify ghcr.io/${{ env.IMAGE_OWNER }}/agentic-os:${{ github.ref_name }} \
              --certificate-identity-regexp="https://github.com/${{ github.repository }}.*" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com"
            ```
