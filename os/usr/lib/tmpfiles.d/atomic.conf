# Atomic OS - persistent directory layout for atomicagentd
#
# Type  Path                            Mode  User           Group          Age  Argument
#
# Base agent directory: 0755 so DynamicUser processes (ephemeral "other" UID)
# can traverse into per-agent subdirectories to reach their exec binary.
d  /var/lib/atomic                      0755  atomic-daemon  atomic-daemon  -    -
d  /var/lib/atomic/agents               0755  atomic-daemon  atomic-daemon  -    -

# Runtime sockets (recreated on each boot)
d  /run/atomic                          0750  atomic-daemon  atomic-daemon  -    -
