# Atomic Linux dracut initrd configuration
# Ensures audit and SELinux are active from the earliest boot stage.

# Load audit kernel module in initrd
add_dracutmodules+=" audit "

# Ensure SELinux policy is loaded before pivot_root
add_dracutmodules+=" selinux "

# Include the audit rules in the initrd
install_items+=" /etc/audit/audit.rules "

# Compress initrd with zstd for faster boot
compress="zstd"
