# Prevent NetworkManager from overriding the system hostname via DHCP/IPv6.
# Without this, DHCP servers (or SLAAC) can replace /etc/hostname with a
# dynamic string like "dynamic-2a00-1028-..." derived from the IPv6 address.
# The hostname is managed by hostnamectl (writes /etc/hostname, persists on bootc).
[main]
hostname-mode=none
