# Atomic OS system users
# Processed by systemd-sysusers at boot.
# These accounts are used by atomicagentd for agent sandboxing.

# atomicagentd daemon runs as this user
u atomic-daemon 989 "Atomic Agent Daemon" /var/lib/atomic /sbin/nologin

# Group for operators allowed to manage agents via atomic-agent-ctl
g atomic-admin 988 -

# Add atomic-daemon to atomic-admin group
m atomic-daemon atomic-admin
