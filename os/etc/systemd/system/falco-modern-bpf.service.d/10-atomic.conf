# Atomic OS drop-in for falco-modern-bpf.service
#
# Overrides from the upstream Falco RPM unit:
#   1. ExecStart: use our config explicitly (-c /etc/falco/falco.yaml).
#   2. StandardOutput/StandardError: upstream unit sets StandardOutput=null
#      which also silences StandardError via inheritance.  Restore journal
#      logging so Falco alerts are visible via journalctl and picked up by
#      the system log (needed for demo and for production audit trail).

[Service]
# Empty assignment clears the inherited ExecStart, then we set our own.
ExecStart=
ExecStart=/usr/bin/falco -c /etc/falco/falco.yaml

# Restore journal logging.
StandardOutput=journal
StandardError=journal
