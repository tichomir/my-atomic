# Falco configuration for Agentic OS
# Falco provides kernel-level runtime threat detection for AI agents.

# --- Rule files ---
rules_files:
  - /etc/falco/falco_rules.yaml          # Upstream Falco base rules
  - /etc/falco/rules.d/atomic_base.yaml  # Atomic OS base rules
  - /etc/falco/rules.d/atomic_agents.yaml # AI agent-specific rules

# --- Output ---
# JSON output for machine parsing by atomicagentd
json_output: true
json_include_output_property: true
json_include_tags_property: true

# Write to stdout (captured by systemd journal)
stdout_output:
  enabled: true

# Webhook to atomicagentd for automated response
http_output:
  enabled: true
  url: "http://127.0.0.1:9765/falco"
  user_agent: "falcosecurity/falco"
  mtls: false

# --- Engine ---
engine:
  kind: modern_ebpf
  modern_ebpf:
    cpus_for_each_syscall_handler: 2

# --- Logging ---
log_stderr: true
log_syslog: false
log_level: info

# --- Performance ---
# Buffer size for kernel events
syscall_event_drops:
  actions:
    - log
    - alert
  rate: 0.03333
  max_burst: 10

# --- Priorities ---
# Only alert on WARNING and above to reduce noise in agent environments
priority: WARNING
